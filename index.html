<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Tarefas | Matheus Costa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="todo-card">
      <div class="todo-header">
        <p class="tag">Projeto JavaScript</p>

        <h1>Lista de Tarefas</h1>

        <p class="subtitle">
          Organize seus estudos de programação adicionando tarefas,
          marcando como concluídas e removendo o que não precisa mais.
        </p>
      </div>

      <div class="form">
        <input 
          type="text" 
          id="taskInput" 
          placeholder="Digite uma tarefa..."
        >

        <button id="addButton">
          Adicionar
        </button>
      </div>

      <div class="status">
        <span id="totalTasks">0 tarefas</span>
        <span id="doneTasks">0 concluídas</span>
      </div>

      <ul id="taskList" class="task-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
